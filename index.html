<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Timer</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #00ff88;
      --accent-dim: #00994d;
      --warn: #ffaa00;
      --danger: #ff4455;
      --text: #e0e0e0;
      --muted: #555;
      --font: 'Courier New', Courier, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1rem;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 1rem;
    }

    /* Mode tabs */
    .modes {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .mode-btn {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      padding: 0.4rem;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .mode-btn:hover { border-color: var(--accent-dim); color: var(--text); }
    .mode-btn.active { border-color: var(--accent); color: var(--accent); }

    /* Big clock */
    .clock-area { text-align: center; margin-bottom: 1.5rem; }

    #clock {
      font-size: 5rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: var(--accent);
      line-height: 1;
      transition: color 0.3s;
    }

    #clock.warn  { color: var(--warn); }
    #clock.danger { color: var(--danger); }

    #phase-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* Progress bar */
    .bar-wrap {
      background: var(--border);
      height: 4px;
      border-radius: 2px;
      margin-bottom: 1.8rem;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: var(--accent);
      width: 100%;
      transition: width 1s linear, background 0.3s;
    }

    #progress-bar.warn   { background: var(--warn); }
    #progress-bar.danger { background: var(--danger); }

    /* ASCII bar */
    #ascii-bar {
      font-size: 0.65rem;
      color: var(--accent-dim);
      letter-spacing: 0.05em;
      text-align: center;
      margin-bottom: 1.5rem;
      min-height: 1.2em;
      transition: color 0.3s;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .btn {
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      padding: 0.5rem 1.4rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .btn:hover { background: var(--accent); color: var(--bg); }
    .btn.secondary { border-color: var(--border); color: var(--muted); }
    .btn.secondary:hover { border-color: var(--muted); color: var(--text); background: none; }

    /* Session count */
    .sessions-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }

    .dot.done { background: var(--accent); }

    /* Settings */
    .settings-toggle {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 0.5rem;
      text-align: center;
      width: 100%;
    }

    .settings-toggle:hover { color: var(--text); }

    .settings-panel {
      display: none;
      margin-top: 1rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      gap: 0.75rem;
      flex-direction: column;
    }

    .settings-panel.open { display: flex; }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .setting-row input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.75rem;
      width: 60px;
      padding: 0.25rem 0.4rem;
      text-align: right;
    }

    .setting-row input:focus { outline: none; border-color: var(--accent); }

    /* History */
    .hist-card { max-width: 480px; width: 100%; }

    .hist-header {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    #history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 180px;
      overflow-y: auto;
    }

    #history-list li {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    #history-list li .hl { color: var(--accent); }
    #history-list li .time { color: #444; }

    .empty-hist {
      font-size: 0.7rem;
      color: #333;
      text-align: center;
      padding: 1rem 0;
    }

    /* Notification dot */
    .notif {
      position: fixed;
      top: 1rem; right: 1rem;
      background: var(--accent);
      color: var(--bg);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.7rem;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .notif.show { opacity: 1; }
  </style>
</head>
<body>

<h1>⬛ Focus Timer</h1>

<div class="card">
  <!-- Mode tabs -->
  <div class="modes">
    <button class="mode-btn active" data-mode="focus">Fokus</button>
    <button class="mode-btn" data-mode="short">Kurze Pause</button>
    <button class="mode-btn" data-mode="long">Lange Pause</button>
  </div>

  <!-- Clock -->
  <div class="clock-area">
    <div id="clock">25:00</div>
    <div id="phase-label">bereit</div>
  </div>

  <!-- Thin progress bar -->
  <div class="bar-wrap"><div id="progress-bar"></div></div>

  <!-- ASCII bar -->
  <div id="ascii-bar"></div>

  <!-- Buttons -->
  <div class="controls">
    <button class="btn" id="start-btn">Start</button>
    <button class="btn secondary" id="reset-btn">Reset</button>
  </div>

  <!-- Session dots -->
  <div class="sessions-row">
    <span>Sitzungen:</span>
    <div id="dots"></div>
    <span id="session-count">0</span>
  </div>

  <!-- Settings -->
  <button class="settings-toggle" id="settings-toggle">▸ Einstellungen</button>
  <div class="settings-panel" id="settings-panel">
    <div class="setting-row">
      <span>Fokus (min)</span>
      <input type="number" id="cfg-focus" value="25" min="1" max="99" />
    </div>
    <div class="setting-row">
      <span>Kurze Pause (min)</span>
      <input type="number" id="cfg-short" value="5" min="1" max="99" />
    </div>
    <div class="setting-row">
      <span>Lange Pause (min)</span>
      <input type="number" id="cfg-long" value="15" min="1" max="99" />
    </div>
    <div class="setting-row">
      <span>Sitzungen bis lange Pause</span>
      <input type="number" id="cfg-sessions" value="4" min="2" max="12" />
    </div>
  </div>
</div>

<!-- History -->
<div class="card hist-card">
  <div class="hist-header">Sitzungshistorie</div>
  <ul id="history-list">
    <li class="empty-hist" id="empty-hint">Noch keine abgeschlossenen Sitzungen.</li>
  </ul>
</div>

<div class="notif" id="notif"></div>

<script>
  // ── State ───────────────────────────────────────────────────────────────────
  const cfg = () => ({
    focus:    parseInt(document.getElementById('cfg-focus').value)    || 25,
    short:    parseInt(document.getElementById('cfg-short').value)    || 5,
    long:     parseInt(document.getElementById('cfg-long').value)     || 15,
    sessions: parseInt(document.getElementById('cfg-sessions').value) || 4,
  });

  const MODES = { focus: 'Fokus', short: 'Kurze Pause', long: 'Lange Pause' };

  let mode       = 'focus';
  let running    = false;
  let remaining  = 0;
  let total      = 0;
  let interval   = null;
  let sessions   = 0;
  let history    = JSON.parse(localStorage.getItem('ft-history') || '[]');

  // ── DOM refs ─────────────────────────────────────────────────────────────────
  const clockEl    = document.getElementById('clock');
  const labelEl    = document.getElementById('phase-label');
  const barEl      = document.getElementById('progress-bar');
  const asciiEl    = document.getElementById('ascii-bar');
  const startBtn   = document.getElementById('start-btn');
  const resetBtn   = document.getElementById('reset-btn');
  const dotsEl     = document.getElementById('dots');
  const countEl    = document.getElementById('session-count');
  const histEl     = document.getElementById('history-list');
  const notifEl    = document.getElementById('notif');
  const settToggle = document.getElementById('settings-toggle');
  const settPanel  = document.getElementById('settings-panel');

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function fmt(sec) {
    const m = String(Math.floor(sec / 60)).padStart(2, '0');
    const s = String(sec % 60).padStart(2, '0');
    return `${m}:${s}`;
  }

  function notify(msg) {
    notifEl.textContent = msg;
    notifEl.classList.add('show');
    setTimeout(() => notifEl.classList.remove('show'), 2500);
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('Focus Timer', { body: msg, silent: false });
    }
  }

  function asciiProgress(ratio) {
    const W = 32;
    const filled = Math.round(ratio * W);
    return '[' + '█'.repeat(filled) + '░'.repeat(W - filled) + ']';
  }

  function colorClass(ratio) {
    if (ratio > 0.25) return '';
    if (ratio > 0.1)  return 'warn';
    return 'danger';
  }

  function render() {
    const ratio = total > 0 ? remaining / total : 1;
    const cls   = colorClass(ratio);

    clockEl.textContent = fmt(remaining);
    clockEl.className   = cls;
    barEl.style.width   = (ratio * 100) + '%';
    barEl.className      = cls;
    asciiEl.textContent  = asciiProgress(ratio);
    asciiEl.style.color  = cls === 'danger' ? 'var(--danger)'
                         : cls === 'warn'   ? 'var(--warn)'
                         : 'var(--accent-dim)';
  }

  function setMode(m) {
    mode = m;
    const c = cfg();
    const mins = m === 'focus' ? c.focus : m === 'short' ? c.short : c.long;
    remaining = mins * 60;
    total     = remaining;
    labelEl.textContent = MODES[m];
    document.querySelectorAll('.mode-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === m));
    stopTimer();
    render();
  }

  function stopTimer() {
    clearInterval(interval);
    running = false;
    startBtn.textContent = 'Start';
  }

  function startTimer() {
    running = true;
    startBtn.textContent = 'Pause';
    labelEl.textContent = mode === 'focus' ? '● Fokus' : '● Pause';

    interval = setInterval(() => {
      remaining--;
      render();
      if (remaining <= 0) {
        clearInterval(interval);
        onTimerEnd();
      }
    }, 1000);
  }

  function onTimerEnd() {
    running = false;
    startBtn.textContent = 'Start';

    if (mode === 'focus') {
      sessions++;
      saveHistory();
      renderDots();
      notify('Fokus-Sitzung abgeschlossen! Zeit für eine Pause.');

      const c = cfg();
      const nextMode = (sessions % c.sessions === 0) ? 'long' : 'short';
      setTimeout(() => setMode(nextMode), 600);
    } else {
      notify('Pause vorbei — zurück an die Arbeit!');
      setTimeout(() => setMode('focus'), 600);
    }
  }

  function saveHistory() {
    const now  = new Date();
    const time = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    const date = now.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
    const mins = cfg().focus;
    history.unshift({ date, time, mins, label: `Fokus-Sitzung #${sessions}` });
    if (history.length > 30) history.pop();
    localStorage.setItem('ft-history', JSON.stringify(history));
    renderHistory();
  }

  function renderDots() {
    const c            = cfg();
    const sessionCount = c.sessions;
    dotsEl.innerHTML = '';
    for (let i = 0; i < sessionCount; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < (sessions % sessionCount || (sessions > 0 && sessions % sessionCount === 0 ? sessionCount : 0)) ? ' done' : '');
      dotsEl.appendChild(d);
    }
    countEl.textContent = sessions;
  }

  function renderHistory() {
    const empty = document.getElementById('empty-hint');
    if (history.length === 0) {
      if (!empty) histEl.innerHTML = '<li class="empty-hist" id="empty-hint">Noch keine abgeschlossenen Sitzungen.</li>';
      return;
    }
    histEl.innerHTML = history.map(h =>
      `<li>
        <span class="hl">${h.label}</span>
        <span>${h.mins} min</span>
        <span class="time">${h.date} ${h.time}</span>
      </li>`
    ).join('');
  }

  // ── Events ───────────────────────────────────────────────────────────────────
  startBtn.addEventListener('click', () => {
    if (running) stopTimer();
    else startTimer();
  });

  resetBtn.addEventListener('click', () => {
    stopTimer();
    setMode(mode);
  });

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
  });

  settToggle.addEventListener('click', () => {
    const open = settPanel.classList.toggle('open');
    settToggle.textContent = (open ? '▾' : '▸') + ' Einstellungen';
  });

  // Update timer when settings change (only if not running)
  ['cfg-focus','cfg-short','cfg-long'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
      if (!running) setMode(mode);
    });
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
      e.preventDefault();
      if (running) stopTimer(); else startTimer();
    }
    if (e.code === 'KeyR' && e.target.tagName !== 'INPUT') {
      stopTimer(); setMode(mode);
    }
  });

  // Request notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  setMode('focus');
  renderDots();
  renderHistory();
</script>
</body>
</html>
